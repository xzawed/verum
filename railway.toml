[build]
builder = "DOCKERFILE"
# ROOT Dockerfile only — single image: Next.js (Node PID1) + Python worker child.
# apps/api/Dockerfile was the pre-pivot Python-only image and has been deleted.
# If Railway dashboard shows a different path, override it here via this file.
dockerfilePath = "Dockerfile"

[deploy]
# Explicit start command overrides any Railway dashboard setting or
# package.json "start" script detection.  The standalone build does not
# have `next` in PATH; it must be started via `node server.js`.
startCommand = "dumb-init node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
