services:
  db-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: verum
      POSTGRES_PASSWORD: verum
      POSTGRES_DB: verum
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verum"]
      interval: 2s
      timeout: 5s
      retries: 10
