# Integration test stack — mirrors Railway production topology.
# Uses the same Dockerfile as prod; all external APIs redirected to mock-providers.
# Usage: make integration-up && make integration-test && make integration-down
# Trigger: bump to re-run CI after workflow path additions

networks:
  verum-int:
    driver: bridge

volumes:
  int-db-data:
  integration-state:

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: verum
      POSTGRES_PASSWORD: verum
      POSTGRES_DB: verum
    volumes:
      - int-db-data:/var/lib/postgresql/data
    networks:
      - verum-int
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verum -d verum"]
      interval: 5s
      timeout: 3s
      retries: 20

  mock-providers:
    build:
      context: tests/integration/mock-providers
      dockerfile: Dockerfile
    environment:
      MOCK_SEED: "42"
      MOCK_LATENCY_MS: "0"
      MOCK_FIXTURE_STRICT: "1"
    networks:
      - verum-int
    ports:
      - "9001:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 10

  git-http:
    build:
      context: tests/integration/git-http
      dockerfile: Dockerfile
    volumes:
      - ./tests/fixtures/sample-repo:/fixtures/sample-repo:ro
    networks:
      - verum-int
    healthcheck:
      test: ["CMD-SHELL", "git ls-remote http://localhost/verum-fixtures/sample-repo.git HEAD"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  verum-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      mock-providers:
        condition: service_healthy
      git-http:
        condition: service_healthy
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: postgresql+asyncpg://verum:verum@db:5432/verum
      # Auth — dummy values sufficient for test-login bypass
      AUTH_SECRET: "integration-test-secret-32chars!!"
      NEXTAUTH_SECRET: "integration-test-secret-32chars!!"
      AUTH_GITHUB_ID: "mock-github-client-id"
      AUTH_GITHUB_SECRET: "mock-github-client-secret"
      # Redirect all LLM/embedding APIs to mock-providers
      ANTHROPIC_API_KEY: "test-anthropic-key"
      ANTHROPIC_BASE_URL: "http://mock-providers:9000/anthropic"
      VOYAGE_API_KEY: "test-voyage-key"
      EMBED_BASE_URL: "http://mock-providers:9000/voyage/v1/embeddings"
      OPENAI_API_KEY: "test-openai-key"
      OPENAI_BASE_URL: "http://mock-providers:9000/openai/v1"
      # GitHub API override
      GITHUB_API_BASE: "http://mock-providers:9000/github"
      GITHUB_OAUTH_BASE: "http://mock-providers:9000/github"
      # Integration-specific Verum flags
      VERUM_TEST_MODE: "1"
      VERUM_ALLOW_INSECURE_CLONE_HOSTS: "git-http"
      VERUM_EXPERIMENT_INTERVAL_SECONDS: "10"
      VERUM_DEPLOY_VARIANT_FRACTION: "0.5"
      # Worker behavior
      PYTHON_BIN: "python3"
    networks:
      - verum-int
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  fake-arcana:
    build:
      context: tests/fixtures/fake-arcana
      dockerfile: Dockerfile
    depends_on:
      verum-app:
        condition: service_healthy
    environment:
      VERUM_APP_URL: "http://verum-app:8080"
      OPENAI_BASE_URL: "http://mock-providers:9000/openai/v1"
      INTEGRATION_STATE_DIR: "/integration-state"
    volumes:
      - integration-state:/integration-state
    networks:
      - verum-int

  test-runner:
    image: python:3.13-slim
    profiles:
      - run
    depends_on:
      verum-app:
        condition: service_healthy
      mock-providers:
        condition: service_healthy
    environment:
      VERUM_APP_URL: "http://verum-app:8080"
      VERUM_DB_URL: "postgresql+asyncpg://verum:verum@db:5432/verum"
      MOCK_PROVIDERS_URL: "http://mock-providers:9000"
      AUTH_SECRET: "integration-test-secret-32chars!!"
      INTEGRATION_STATE_DIR: "/integration-state"
    volumes:
      - .:/workspace:ro
      - ./artifacts:/workspace/artifacts
      - integration-state:/integration-state
    working_dir: /workspace
    networks:
      - verum-int
    command: >
      bash -c "pip install -q pytest pytest-asyncio httpx sqlalchemy asyncpg
               && pytest tests/integration -m integration -v --maxfail=1"
