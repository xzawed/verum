# Phase 0 stub — not runnable until apps/api and apps/dashboard are implemented.
# Run `make dev` once Phase 0 is complete.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: verum
      POSTGRES_PASSWORD: verum
      POSTGRES_DB: verum
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verum"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://verum:verum@db:5432/verum
      ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./apps/dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - api
      - redis

volumes:
  db_data:
