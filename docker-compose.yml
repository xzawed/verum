# Local development compose.
# Architecture pivot (2026-04-20): Node.js is PID 1 and spawns the Python
# worker as a child process. There is a single combined service (verum) that
# uses the root Dockerfile — apps/api/Dockerfile has been deleted.
#
# NOTE: Run `make docker-healthcheck` after any Dockerfile change to verify
# the combined image starts correctly before pushing.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: verum
      POSTGRES_PASSWORD: verum
      POSTGRES_DB: verum
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verum"]
      interval: 5s
      timeout: 5s
      retries: 5

  verum:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://verum:verum@db:5432/verum
      NODE_ENV: development
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
