sonar.projectKey=xzawed_verum
sonar.organization=xzawed

sonar.projectName=Verum
sonar.projectVersion=1.0

# Sources
sonar.sources=apps/api/src,packages/sdk-python/src,packages/sdk-typescript/src,apps/dashboard/src

# Test directories
sonar.tests=apps/api/tests,packages/sdk-python/tests,packages/sdk-typescript/tests,apps/dashboard/tests

# Test file patterns
sonar.test.inclusions=\
  apps/api/tests/**/*.py,\
  packages/sdk-python/tests/**/*.py,\
  packages/sdk-typescript/tests/**/*.ts,\
  apps/dashboard/src/**/__tests__/**/*.test.ts,\
  apps/dashboard/tests/e2e/**/*.spec.ts

# Language settings
sonar.python.version=3.13

# Python coverage reports (API backend + SDK Python)
sonar.python.coverage.reportPaths=\
  apps/api/coverage.xml,\
  coverage-artifacts/sdk-python/coverage.xml

# TypeScript/JavaScript coverage reports (LCOV from Jest)
sonar.javascript.lcov.reportPaths=\
  coverage-artifacts/sdk-typescript/lcov.info,\
  coverage-artifacts/dashboard/lcov.info

# Exclusions
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  apps/api/alembic/**,\
  apps/dashboard/.next/**,\
  apps/dashboard/node_modules/**,\
  **/node_modules/**,\
  scripts/**,\
  **/*.test.ts,\
  **/*.spec.ts

sonar.coverage.exclusions=\
  apps/api/src/worker/main.py,\
  apps/api/src/loop/analyze/cli.py,\
  apps/api/src/loop/infer/cli.py,\
  apps/api/src/loop/harvest/cli.py,\
  apps/api/alembic/**,\
  scripts/**

# Encoding
sonar.sourceEncoding=UTF-8
