name: integration

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC daily (17:00 KST)
  workflow_dispatch:
  push:
    paths:
      - "apps/api/src/loop/**"
      - "apps/api/src/worker/**"
      - "apps/dashboard/src/app/api/**"
      - "apps/dashboard/src/auth*"
      - "apps/dashboard/src/lib/db/**"
      - "Dockerfile"
      - "tests/integration/**"
      - "tests/fixtures/**"
      - "docker-compose.integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/src/loop/**"
      - "apps/api/src/worker/**"
      - "apps/dashboard/src/app/api/**"
      - "apps/dashboard/src/auth*"
      - "apps/dashboard/src/lib/db/**"
      - "Dockerfile"
      - "tests/integration/**"
      - "tests/fixtures/**"
      - "docker-compose.integration.yml"

jobs:
  integration:
    name: Integration Test (ANALYZE → EVOLVE)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"

      - name: Create artifacts directory
        run: mkdir -p artifacts/integration

      - name: Install integration test dependencies
        run: pip install pytest pytest-asyncio httpx sqlalchemy asyncpg alembic

      - name: Build and start integration stack
        run: make integration-up

      - name: Wait for services to be healthy
        run: |
          echo "Services status:"
          docker compose -f docker-compose.integration.yml ps

      - name: Run Alembic migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://verum:verum@localhost:5433/verum
          PYTHONPATH: .
        run: python -m alembic upgrade head

      - name: Run smoke tests
        run: make integration-smoke

      - name: Run full integration suite
        run: make integration-test

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: integration-artifacts-${{ github.run_number }}
          path: artifacts/integration/
          retention-days: 14

      - name: Collect service logs on failure
        if: failure()
        run: docker compose -f docker-compose.integration.yml logs --tail=500 > artifacts/integration/service-logs.txt 2>&1

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: integration-logs-${{ github.run_number }}
          path: artifacts/integration/service-logs.txt
          retention-days: 7

      - name: Tear down integration stack
        if: always()
        run: make integration-down
