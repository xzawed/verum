name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC — runs dogfood-arcana
  workflow_dispatch:
    inputs:
      dogfood:
        description: "Run dogfood-arcana job"
        required: false
        default: "false"

jobs:
  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install "apps/api[dev]"
      - name: ruff
        run: ruff check apps/api/src packages/sdk-python/src
      - name: bandit
        run: bandit -r apps/api/src -ll
      - name: mypy
        run: mypy apps/api/src --ignore-missing-imports

  lint-typescript:
    name: TypeScript lint (sdk-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: tsc — sdk-typescript
        run: cd packages/sdk-typescript && npm install --no-audit --no-fund && npx tsc --noEmit
      - name: tsc — dashboard
        run: cd apps/dashboard && npm install --no-audit --no-fund && npx tsc --noEmit

  test-api:
    name: Python tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: verum
          POSTGRES_PASSWORD: verum
          POSTGRES_DB: verum
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install "apps/api[dev]"
      - name: Run tests
        working-directory: apps/api
        run: pytest tests -v --cov=src.loop.analyze --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://verum:verum@localhost:5432/verum
          PYTHONPATH: .

  dogfood-arcana:
    name: Dogfood — ArcanaInsight ANALYZE
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: verum
          POSTGRES_PASSWORD: verum
          POSTGRES_DB: verum
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install "apps/api[dev]"
      - name: Run ANALYZE against ArcanaInsight
        working-directory: apps/api
        run: |
          python -m src.loop.analyze.cli \
            --repo https://github.com/xzawed/ArcanaInsight \
            --branch main \
            > /tmp/arcana-result.json
          python - <<'EOF'
          import json, sys
          data = json.load(open("/tmp/arcana-result.json"))
          count = len(data.get("call_sites", []))
          print(f"call_sites: {count}")
          assert count >= 4, f"Expected >= 4 call sites, got {count}"
          print("PASS: dogfood-arcana")
          EOF
        env:
          PYTHONPATH: .
