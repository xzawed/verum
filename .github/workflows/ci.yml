name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install "apps/api[dev]"
      - name: ruff
        run: ruff check apps/api/src packages/sdk-python/src
      - name: bandit
        run: bandit -r apps/api/src -ll
      - name: mypy
        run: mypy apps/api/src --ignore-missing-imports

  lint-typescript:
    name: TypeScript lint (sdk-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: tsc — sdk-typescript
        run: cd packages/sdk-typescript && npm install --no-audit --no-fund && npx tsc --noEmit
      # Dashboard tsc activated in Phase 3 once Next.js app scaffold lands

  test-api:
    name: Python tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: verum
          POSTGRES_PASSWORD: verum
          POSTGRES_DB: verum
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install "apps/api[dev]"
      - name: Run tests
        working-directory: apps/api
        run: pytest tests -v
        env:
          DATABASE_URL: postgresql+asyncpg://verum:verum@localhost:5432/verum
          PYTHONPATH: .
