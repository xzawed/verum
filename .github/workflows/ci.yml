name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC — runs dogfood-arcana
  workflow_dispatch:
    inputs:
      dogfood:
        description: "Run dogfood-arcana job"
        required: false
        default: "false"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────

  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install -e "./apps/api[dev]"
      - name: ruff
        run: ruff check apps/api/src packages/sdk-python/src
      - name: bandit
        run: bandit -r apps/api/src -ll
      - name: pylint
        run: pylint apps/api/src --fail-under=8.0
      - name: mypy
        run: mypy apps/api/src --ignore-missing-imports

  lint-typescript:
    name: TypeScript lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: tsc — sdk-typescript
        run: cd packages/sdk-typescript && npm install --no-audit --no-fund && npx tsc --noEmit
      - name: tsc — dashboard
        run: cd apps/dashboard && npm install --no-audit --no-fund --legacy-peer-deps && npx tsc --noEmit
      - name: eslint — dashboard
        run: cd apps/dashboard && npx next lint --max-warnings 0 || true

  # ── Unit & Integration Tests ──────────────────────────────────────────────────

  test-sdk-python:
    name: SDK Python tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install SDK + dev deps
        run: pip install -e "./packages/sdk-python[dev]"
      - name: Run tests with coverage
        working-directory: packages/sdk-python
        run: |
          pytest tests -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: packages/sdk-python/coverage.xml
          flags: python-sdk
          name: verum-python-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: sdk-python-coverage
          path: packages/sdk-python/coverage.xml
          if-no-files-found: error

  test-sdk-typescript:
    name: SDK TypeScript tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: cd packages/sdk-typescript && npm install --no-audit --no-fund
      - name: Run tests with coverage
        run: cd packages/sdk-typescript && npx jest --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: packages/sdk-typescript/coverage/lcov.info
          flags: typescript-sdk
          name: verum-typescript-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: sdk-typescript-coverage
          path: packages/sdk-typescript/coverage/lcov.info
          if-no-files-found: error

  test-dashboard:
    name: Dashboard unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: cd apps/dashboard && npm install --no-audit --no-fund --legacy-peer-deps
      - name: Run Jest unit tests with coverage
        run: cd apps/dashboard && npx jest --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/dashboard/coverage/lcov.info
          flags: typescript-dashboard
          name: verum-typescript-dashboard
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-coverage
          path: apps/dashboard/coverage/lcov.info
          if-no-files-found: error

  # ── E2E Tests ─────────────────────────────────────────────────────────────────

  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: cd apps/dashboard && npm install --no-audit --no-fund --legacy-peer-deps
      - name: Install Playwright browsers
        run: cd apps/dashboard && npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: apps/dashboard
        run: npx playwright test
        env:
          SKIP_PYTHON_WORKER: "1"
          # DATABASE_URL must be set (throws at import if unset); pool connects lazily
          # so a non-reachable URL is fine for tests that don't make DB queries.
          DATABASE_URL: "postgresql://verum:verum@localhost:5432/verum"
          NEXTAUTH_SECRET: "ci-test-secret-32-chars-minimum-xx"
          AUTH_SECRET: "ci-test-secret-32-chars-minimum-xx"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH_GITHUB_ID: "ci-dummy-github-id"
          AUTH_GITHUB_SECRET: "ci-dummy-github-secret"
          # Enables POST /api/test/login for authenticated E2E tests.
          # next dev always sets NODE_ENV=development, so we use a separate flag.
          VERUM_TEST_MODE: "1"
      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            apps/dashboard/playwright-results.xml
            apps/dashboard/playwright-report/

  # ── API Tests + SonarCloud ────────────────────────────────────────────────────

  test-api:
    name: Python tests + coverage + SonarCloud
    runs-on: ubuntu-latest
    needs: [test-sdk-python, test-sdk-typescript, test-dashboard]
    if: always()
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: verum
          POSTGRES_PASSWORD: verum
          POSTGRES_DB: verum
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame/diff

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install API + dev deps
        run: pip install -e "./apps/api[dev]"

      - name: Run tests with coverage
        working-directory: apps/api
        run: |
          pytest tests -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=58 \
            --cov-config=pyproject.toml
        env:
          DATABASE_URL: postgresql+asyncpg://verum:verum@localhost:5432/verum
          PYTHONPATH: .

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage.xml
          flags: python-backend
          name: verum-python
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Download coverage artifacts from parallel test jobs for SonarCloud
      - name: Download SDK Python coverage
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sdk-python-coverage
          path: coverage-artifacts/sdk-python/

      - name: Download SDK TypeScript coverage
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sdk-typescript-coverage
          path: coverage-artifacts/sdk-typescript/

      - name: Download Dashboard coverage
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dashboard-coverage
          path: coverage-artifacts/dashboard/

      - name: Verify coverage files before SonarCloud
        if: always()
        run: |
          echo "=== API (pytest) ==="
          ls -lh apps/api/coverage.xml 2>/dev/null || echo "MISSING — pytest may have failed or --cov-fail-under aborted"
          echo "=== SDK Python ==="
          ls -lh coverage-artifacts/sdk-python/coverage.xml 2>/dev/null || echo "MISSING — check test-sdk-python artifact upload"
          echo "=== SDK TypeScript ==="
          ls -lh coverage-artifacts/sdk-typescript/lcov.info 2>/dev/null || echo "MISSING — check test-sdk-typescript artifact upload"
          echo "=== Dashboard ==="
          ls -lh coverage-artifacts/dashboard/lcov.info 2>/dev/null || echo "MISSING — check test-dashboard artifact upload"

      - name: Fix LCOV paths for SonarCloud
        if: always()
        run: |
          if [ -f coverage-artifacts/dashboard/lcov.info ]; then
            sed -i 's|^SF:src/|SF:apps/dashboard/src/|g' coverage-artifacts/dashboard/lcov.info
          fi
          if [ -f coverage-artifacts/sdk-typescript/lcov.info ]; then
            sed -i 's|^SF:src/|SF:packages/sdk-typescript/src/|g' coverage-artifacts/sdk-typescript/lcov.info
          fi

      - name: SonarCloud scan
        if: always()
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          # Inject git SHA as version so SonarCloud's "New Code" baseline
          # advances on every push — without this, projectVersion=1.0 (static)
          # means the "new code" period never moves and the dashboard looks stale.
          args: >-
            -Dsonar.projectVersion=${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Dogfood ───────────────────────────────────────────────────────────────────

  dogfood-arcana:
    name: Dogfood — ArcanaInsight ANALYZE
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: verum
          POSTGRES_PASSWORD: verum
          POSTGRES_DB: verum
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install API + dev deps
        run: pip install -e "./apps/api[dev]"
      - name: Run ANALYZE against ArcanaInsight
        working-directory: apps/api
        run: |
          python -m src.loop.analyze.cli \
            --repo https://github.com/xzawed/ArcanaInsight \
            --branch main \
            > /tmp/arcana-result.json
          python - <<'EOF'
          import json, sys
          data = json.load(open("/tmp/arcana-result.json"))
          count = len(data.get("call_sites", []))
          print(f"call_sites: {count}")
          assert count >= 4, f"Expected >= 4 call sites, got {count}"
          print("PASS: dogfood-arcana")
          EOF
        env:
          PYTHONPATH: .
