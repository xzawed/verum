[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "verum"
version = "0.0.0"
description = "Verum SDK — connect your AI service to The Verum Loop"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://github.com/xzawed/verum"
Documentation = "https://docs.verum.dev"
