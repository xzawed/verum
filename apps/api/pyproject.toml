# Phase 0 stub — dependencies from CLAUDE.md §🏗 기술 스택
# Not all packages are installed yet; add as each phase implements its stage.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "verum-api"
version = "0.0.0"
requires-python = ">=3.13"
dependencies = [
    # Phase 0
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
    # Phase 0 DB
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "pgvector>=0.3",
    # Phase 1 — ANALYZE
    # "libcst>=1.3",
    # "tree-sitter>=0.23",
    # Phase 2 — HARVEST
    # "httpx>=0.27",
    # "trafilatura>=1.9",
    # "playwright>=1.44",
    # Phase 2 — embeddings
    # "openai>=1.30",
    # "anthropic>=0.28",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.4",
    "pylint>=3",
    "bandit>=1.7",
    "mypy>=1.10",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.13"
strict = true
