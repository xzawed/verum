codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: 60%          # fail PR if overall coverage drops below 60%
        threshold: 2%        # allow 2% drop without failing
        base: auto
    patch:
      default:
        target: 50%          # new code in a PR must be at least 50% covered
        threshold: 5%

parsers:
  python:
    use_packages: true

ignore:
  - "apps/api/alembic/**"
  - "apps/api/src/worker/main.py"
  - "apps/api/src/loop/analyze/cli.py"
  - "apps/api/src/loop/infer/cli.py"
  - "apps/api/src/loop/harvest/cli.py"
  - "scripts/**"
  # SDK module-init blocks use # pragma: no cover; codecov sees them as missing
  # in the patch diff because coverage.py removes them from the report entirely.
  - "packages/sdk-python/src/verum/anthropic.py"
  - "packages/sdk-python/src/verum/openai.py"
  # Test fixtures and integration-only utilities are not in unit test coverage
  # reports; exclude them from patch analysis to avoid false "uncovered" hits.
  - "tests/fixtures/**"
  - "tests/integration/**"
  - "apps/api/tests/**"
  # Jest excludes __tests__ dirs from collectCoverageFrom; ignore in Codecov too
  # so new test files don't count as "uncovered" lines in patch analysis.
  - "apps/dashboard/src/**/__tests__/**"
  # Drizzle ORM schema — declarative, mirrors alembic exclusion and Jest collectCoverageFrom exclusion.
  - "apps/dashboard/src/lib/db/schema.ts"

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: false

flags:
  python-backend:
    paths:
      - apps/api/src/
    carryforward: true

  python-sdk:
    paths:
      - packages/sdk-python/src/
    carryforward: true

  typescript-sdk:
    paths:
      - packages/sdk-typescript/src/
    carryforward: true

  typescript-dashboard:
    paths:
      - apps/dashboard/src/
    carryforward: true
